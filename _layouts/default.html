<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Stylesheet & Favicon -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230D0D0D' rx='25'/%3E%3Ctext x='50' y='65' font-family='Georgia, serif' font-weight='bold' font-size='46' letter-spacing='-1' text-anchor='middle'%3E%3Ctspan fill='%23FFFFFF'%3EJC%3C/tspan%3E%3Ctspan fill='%23C9A84C'%3E.%3C/tspan%3E%3C/text%3E%3C/svg%3E" type="image/svg+xml">

  {% seo %}
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>

  <!-- Navigation -->
  <nav class="nav" id="navbar">
    <a href="{{ '/' | relative_url }}" class="nav-logo">JC<span>.</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#leadership">Leadership</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Main Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-name">JC<span>.</span></div>
    <p class="footer-copy">© {{ 'now' | date: "%Y" }} · Trinity, Alabama · Built with Jekyll</p>
  </footer>

  <!-- Scripts -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
